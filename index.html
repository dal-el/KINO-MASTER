<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KINO MASTER — Updated Stats</title>
<style>
:root {
  --bg: #0d0f14;
  --surface: #151720;
  --card: #1c1f2e;
  --border: #252840;
  --border2: #2e3254;
  --gold: #e8b84b;
  --gold2: #f5d080;
  --text: #e4e6f0;
  --muted: #6b7099;
  --muted2: #8890bb;
  --green: #3ecf8e;
  --blue: #4a9eff;
  --price: #ff9f3f;
}
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
}
.sp-overlay{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:block;}
.sp-inner{max-width:480px;margin:0 auto;padding:16px 16px 80px;}
.sp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 0;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
.sp-title{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.sp-close{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:13px;cursor:pointer;}
.sp-sec{margin-bottom:22px;}
.sp-stitle{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700;}
.sp-stitle::after{content:'';flex:1;height:1px;background:var(--border);}
.sp-stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px 10px;
}
.sp-bpair {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.sp-bball {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 800;
  color: #ffe9a8;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.7),
     1px -1px 0 rgba(0,0,0,0.7),
    -1px  1px 0 rgba(0,0,0,0.7),
     1px  1px 0 rgba(0,0,0,0.7),
     0 2px 6px rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.25);
  box-shadow:
    inset 0 10px 16px rgba(255,255,255,0.22),
    inset 0 -10px 18px rgba(0,0,0,0.18),
    0 4px 12px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}
.sp-bball::before {
  content: '';
  position: absolute;
  top: 8px;
  left: 10px;
  width: 22px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.32);
  filter: blur(1px);
}
.sp-bval {
  min-width: 36px;
  height: 28px;
  padding: 0 8px;
  background: linear-gradient(180deg, #f3f4f7 0%, #d7dce5 100%);
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 800;
  color: #8a8f98;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 2px 6px rgba(0,0,0,0.18);
}
.sp-last-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.sp-lb {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  color: #ffe9a8;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.7),
     1px -1px 0 rgba(0,0,0,0.7),
    -1px  1px 0 rgba(0,0,0,0.7),
     1px  1px 0 rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.2);
  background: radial-gradient(circle at 35% 30%, #ffd96a 0%, #d09b18 55%, #8a5f00 100%);
  box-shadow: inset 0 10px 16px rgba(255,255,255,0.2), inset 0 -8px 16px rgba(0,0,0,0.2), 0 3px 10px rgba(0,0,0,0.35);
}
.sp-history-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.sp-hcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
}
.sp-hid {
  font-size: 11px;
  color: var(--muted2);
  margin-bottom: 8px;
  font-weight: 700;
}
.sp-hballs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.sp-hb {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #ffe9a8;
  text-shadow: -1px -1px 0 rgba(0,0,0,0.65), 1px -1px 0 rgba(0,0,0,0.65), -1px 1px 0 rgba(0,0,0,0.65), 1px 1px 0 rgba(0,0,0,0.65);
  border: 1.5px solid rgba(255,255,255,0.18);
  background: radial-gradient(circle at 35% 30%, #ffd96a 0%, #d09b18 55%, #8a5f00 100%);
}
.sp-note{font-size:11px;color:var(--muted2);margin-bottom:14px;font-family:monospace;}
@media (max-width: 420px) {
  .sp-stats-grid { grid-template-columns: repeat(4, 1fr); }
  .sp-bball { width: 52px; height: 52px; font-size: 18px; }
  .sp-last-grid, .sp-hballs { grid-template-columns: repeat(4, 1fr); }
  .sp-history-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="sp-overlay" id="spOverlay">
  <div class="sp-inner">
    <div class="sp-header">
      <div class="sp-title">ΣΤΑΤΙΣΤΙΚΑ KINO</div>
      <button class="sp-close" id="spClose">ΚΛΕΙΣΙΜΟ</button>
    </div>
    <div id="spContent"></div>
  </div>
</div>
<script>
var STATS_WINDOW = 12;

function normalizeDraws(draws) {
  return (Array.isArray(draws) ? draws : [])
    .filter(function(d){
      return d && d.winningNumbers && Array.isArray(d.winningNumbers.list) && d.winningNumbers.list.length;
    })
    .map(function(d){
      return {
        drawId: Number(d.drawId || 0),
        drawTime: Number(d.drawTime || 0),
        winningNumbers: { list: d.winningNumbers.list.map(Number).sort(function(a,b){ return a-b; }) }
      };
    })
    .sort(function(a,b){
      if (b.drawId !== a.drawId) return b.drawId - a.drawId;
      return b.drawTime - a.drawTime;
    });
}

function uniquePerDraw(list) {
  var seen = {};
  var out = [];
  for (var i = 0; i < list.length; i++) {
    var n = Number(list[i]);
    if (!seen[n]) {
      seen[n] = true;
      out.push(n);
    }
  }
  return out;
}

function computeStatsFromWindow(draws, N) {
  var hist = normalizeDraws(draws).slice(0, N);
  var freq = {}, streak = {}, delay = {};
  for (var n = 1; n <= 80; n++) {
    freq[n] = 0;
    streak[n] = 0;
    delay[n] = hist.length;
  }
  hist.forEach(function(d){
    uniquePerDraw(d.winningNumbers.list).forEach(function(n){ freq[n]++; });
  });
  for (var n2 = 1; n2 <= 80; n2++) {
    var s = 0;
    for (var i = 0; i < hist.length; i++) {
      if (hist[i].winningNumbers.list.indexOf(n2) >= 0) s++;
      else break;
    }
    streak[n2] = s;
  }
  for (var n3 = 1; n3 <= 80; n3++) {
    var found = false;
    for (var j = 0; j < hist.length; j++) {
      if (hist[j].winningNumbers.list.indexOf(n3) >= 0) {
        delay[n3] = j;
        found = true;
        break;
      }
    }
    if (!found) delay[n3] = hist.length;
  }
  return { hist: hist, freq: freq, streak: streak, delay: delay };
}

function colorPair(v, mx, type) {
  var p = mx > 0 ? v / mx : 0;
  if (type === 'delay') {
    if (p > 0.75) return ['#ff6a6a','#9a0d0d'];
    if (p > 0.45) return ['#ff9d3a','#c45200'];
    return ['#ffce63','#d48a00'];
  }
  if (type === 'repeat') {
    return ['#43d46f','#0b7e1f'];
  }
  if (type === 'hot') {
    return ['#71e238','#6cb100'];
  }
  return ['#8fe7ff','#2b74c7'];
}

function mkBall(n, v, mx, type) {
  var c = colorPair(v, mx, type);
  return '<div class="sp-bpair">' +
    '<div class="sp-bball" style="background:radial-gradient(circle at 35% 30%,' + c[0] + ' 0%,' + c[0] + ' 35%,' + c[1] + ' 100%);">' + (n < 10 ? '0' + n : '' + n) + '</div>' +
    '<div class="sp-bval">' + v + '</div>' +
  '</div>';
}

function mkRow(label, nums, map, mx, type) {
  var h = '<div class="sp-sec"><div class="sp-stitle">' + label + '</div><div class="sp-stats-grid">';
  nums.forEach(function(n){ h += mkBall(n, map[n], mx, type); });
  return h + '</div></div>';
}

function spRender(rawDraws) {
  var stats = computeStatsFromWindow(rawDraws, STATS_WINDOW);
  var src = stats.hist, fr = stats.freq, st = stats.streak, dl = stats.delay;
  var all = [];
  for (var x = 1; x <= 80; x++) all.push(x);

  var hot = all.slice().sort(function(a,b){ if (fr[b] !== fr[a]) return fr[b] - fr[a]; return a - b; }).slice(0, 10);
  var cold = all.slice().sort(function(a,b){ if (fr[a] !== fr[b]) return fr[a] - fr[b]; return a - b; }).slice(0, 10);
  var del = all.slice().sort(function(a,b){ if (dl[b] !== dl[a]) return dl[b] - dl[a]; return a - b; }).slice(0, 10);
  var rep = all.filter(function(n){ return st[n] > 0; }).sort(function(a,b){ if (st[b] !== st[a]) return st[b] - st[a]; return a - b; }).slice(0, 10);

  var maxD = del.length ? (dl[del[0]] || 1) : 1;
  var maxF = hot.length ? (fr[hot[0]] || 1) : 1;
  var maxR = rep.length ? (st[rep[0]] || 1) : 1;

  var h = '<div class="sp-note">παράθυρο: τελευταίες ' + src.length + ' κληρώσεις</div>';
  if (rep.length) h += mkRow('ΕΠΑΝΑΛΗΨΕΙΣ', rep, st, maxR, 'repeat');
  h += mkRow('ΚΑΘΥΣΤΕΡΗΣΕΙΣ', del, dl, maxD, 'delay');
  h += mkRow('ΚΑΥΤΑ', hot, fr, maxF, 'hot');
  h += mkRow('ΚΡΥΑ', cold, fr, maxF, 'cold');

  if (src[0]) {
    h += '<div class="sp-sec"><div class="sp-stitle">ΤΕΛΕΥΤΑΙΑ ΚΛΗΡΩΣΗ #' + src[0].drawId + '</div><div class="sp-last-grid">';
    src[0].winningNumbers.list.forEach(function(n){
      h += '<div class="sp-lb">' + (n < 10 ? '0' + n : '' + n) + '</div>';
    });
    h += '</div></div>';
  }

  h += '<div class="sp-sec"><div class="sp-stitle">ΙΣΤΟΡΙΚΟ 12 ΚΛΗΡΩΣΕΩΝ</div><div class="sp-history-grid">';
  src.forEach(function(d, idx){
    h += '<div class="sp-hcard"><div class="sp-hid">#' + d.drawId + (idx === 0 ? ' [νεότερη]' : '') + '</div><div class="sp-hballs">';
    d.winningNumbers.list.forEach(function(n){
      h += '<div class="sp-hb">' + (n < 10 ? '0' + n : '' + n) + '</div>';
    });
    h += '</div></div>';
  });
  h += '</div></div>';

  document.getElementById('spContent').innerHTML = h;
}

// demo data placeholder for preview
spRender([
  {drawId:1284074,winningNumbers:{list:[2,4,8,10,16,18,22,24,27,35,39,44,46,47,52,59,63,66,69,77]}},

  {drawId:1284072,winningNumbers:{list:[3,6,11,16,19,23,27,30,34,38,40,42,47,50,56,60,67,71,73,74]}},
  {drawId:1284071,winningNumbers:{list:[2,5,8,10,15,17,20,24,28,32,36,41,43,45,48,52,58,64,70,75]}},
  {drawId:1284070,winningNumbers:{list:[3,7,12,18,22,29,33,35,39,44,49,53,57,59,62,66,71,74,76,80]}},
  {drawId:1284069,winningNumbers:{list:[1,4,9,13,16,21,25,27,31,34,40,46,47,51,54,60,63,69,73,78]}},
  {drawId:1284068,winningNumbers:{list:[2,6,10,14,19,23,28,30,37,42,45,50,52,55,58,61,65,67,72,77]}},
  {drawId:1284067,winningNumbers:{list:[5,8,11,17,20,24,29,32,35,38,41,44,48,53,56,59,64,68,74,79]}},
  {drawId:1284066,winningNumbers:{list:[3,7,12,15,18,22,26,31,34,39,40,43,47,49,54,57,63,66,71,75]}},
  {drawId:1284065,winningNumbers:{list:[1,4,9,13,16,21,25,27,33,36,42,45,50,52,58,60,62,69,73,80]}},
  {drawId:1284064,winningNumbers:{list:[2,5,10,14,19,23,28,30,35,37,41,44,48,51,55,59,65,67,74,78]}},
  {drawId:1284063,winningNumbers:{list:[6,8,11,17,20,24,29,32,34,38,40,46,47,53,56,61,63,68,71,77]}}
]);

document.getElementById('spClose').onclick = function(){ alert('Το layout είναι έτοιμο για να ενσωματωθεί στο app σου.'); };
</script>
</body>
</html>
