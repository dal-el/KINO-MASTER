function tt(k) { return (T[currentLang] && T[currentLang][k]) ? T[currentLang][k] : k; }
function namesList() { return T[currentLang].names; }

function greekUpper(s) {
  return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
}

function comb(n, r) {
  if (r > n || r < 0) return 0;
  if (r === 0 || r === n) return 1;
  r = Math.min(r, n - r);
  var res = 1;
  for (var i = 1; i <= r; i++) res = (res * (n - r + i)) / i;
  return Math.round(res);
}

function estimateLowerBound(v, k, t, h) {
  var total = comb(v, t);
  var perLine = 0;
  for (var i = h; i <= Math.min(k, t); i++) perLine += comb(k, i) * comb(v - k, t - i);
  if (!perLine) return total;
  return Math.ceil(total / perLine);
}

function minHit(k) {
  if (k <= 5) return 2;
  if (k <= 8) return 3;
  if (k <= 10) return 4;
  return 6;
}

function clampTriggerHit() {
  var v = selected.size || (gameK + 2);
  var minH = minHit(gameK);
  if (hitVal > gameK) hitVal = gameK;
  if (hitVal < minH) hitVal = minH;
  if (triggerVal <= hitVal) triggerVal = hitVal + 1;
  if (triggerVal <= gameK) triggerVal = gameK + 1;
  if (triggerVal > v) triggerVal = v;
  if (hitVal >= triggerVal) hitVal = triggerVal - 1;
  if (hitVal < minH) hitVal = minH;
}

  document.getElementById('lbVal').textContent = isOver ? '∞' : lb;
  document.getElementById('lbVal').className = 'lb-val' + (isOver ? ' over' : isWarn ? ' warn' : '');

  if (costEl) {
    costEl.textContent = isOver ? '∞' : (lb * 0.5).toFixed(2) + '€';
    costEl.style.color = isOver ? 'var(--red)' : isWarn ? 'var(--price)' : 'var(--gold)';
  }
}

function combinations(arr, r) {
  var result = [], combo = [];
  function bt(start) {
    if (combo.length === r) { result.push(combo.slice()); return; }
    for (var i = start; i <= arr.length - (r - combo.length); i++) {
      combo.push(arr[i]); bt(i+1); combo.pop();
    }
  }
  bt(0);
  return result;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function intersectionCount(a, b) {
  var c = 0;
  for (var i = 0; i < a.length; i++) if (b.indexOf(a[i]) >= 0) c++;
  return c;
}

function validateSystem(lines, pool, trigger, hit) {
  var subsets = combinations(pool, trigger);
  for (var i = 0; i < subsets.length; i++) {
    var ok = false;
    for (var j = 0; j < lines.length; j++) {
      if (intersectionCount(lines[j], subsets[i]) >= hit) { ok = true; break; }
    }
    if (!ok) return false;
  }
  return true;
}

function buildLineFromSubset(subset, pool, k, hit) {
  var mustTake = shuffle(subset).slice(0, hit);
  var remain = shuffle(pool.filter(function(x){ return mustTake.indexOf(x) < 0; }));
  return mustTake.concat(remain.slice(0, k-hit)).sort(function(a,b){return a-b;});
}

function uniqueLines(lines) {
  var seen = {}, out = [];
  for (var i = 0; i < lines.length; i++) {
    var key = lines[i].join(',');
    if (!seen[key]) { seen[key] = true; out.push(lines[i]); }
  }
  return out;
}

function lineCoverageCount(line, subsets, hit) {
  var score = 0;
  for (var i = 0; i < subsets.length; i++) {
    if (intersectionCount(line, subsets[i]) >= hit) score++;
  }
  return score;
}

function pruneLines(lines, pool, trigger, hit) {
  var changed = true, current = lines.slice();
  while (changed) {
    changed = false;
    for (var i = current.length - 1; i >= 0; i--) {
      var test = current.slice(0, i).concat(current.slice(i + 1));
      if (validateSystem(test, pool, trigger, hit)) { current = test; changed = true; }
    }
  }
  return current;
}

function autoCorrectingGenerate(pool, k, trigger, hit) {
  var uncovered = combinations(pool, trigger);
  var lines = [], loops = 0;
  while (uncovered.length && lines.length < MAX_COMBOS && loops < 4000) {
    loops++;
    var seed = uncovered[0], best = null, bestScore = -1;
    var tries = uncovered.length > 10000 ? 8 : uncovered.length > 3000 ? 12 : 18;
    for (var t2 = 0; t2 < tries; t2++) {
      var cand = buildLineFromSubset(seed, pool, k, hit);
      var score = lineCoverageCount(cand, uncovered, hit);
      if (score > bestScore) { best = cand; bestScore = score; }
    }
    if (!best) break;
    lines.push(best);
    lines = uniqueLines(lines);
    uncovered = uncovered.filter(function(s){
      return !lines.some(function(l){ return intersectionCount(l, s) >= hit; });
    });
  }
  var fix = 0;
  while (uncovered.length && lines.length < MAX_COMBOS && fix < 4000) {
    fix++;
    var nl = buildLineFromSubset(uncovered[0], pool, k, hit);
    lines.push(nl);
    lines = uniqueLines(lines);
    uncovered = uncovered.filter(function(s){
      return !lines.some(function(l){ return intersectionCount(l, s) >= hit; });
    });
  }
  if (!validateSystem(lines, pool, trigger, hit)) return null;
  lines = pruneLines(lines, pool, trigger, hit);
  if (!validateSystem(lines, pool, trigger, hit)) return null;
  if (lines.length > MAX_COMBOS) return null;
  return lines;
}

function generate() {
  var sortedArr = [];
  selected.forEach(function(n){ sortedArr.push(n); });
  sortedArr.sort(function(a,b){return a-b;});
  var pool = sortedArr;
  var v = pool.length;

  if (v < gameK) {
    showErr('⚠️ ' + tt('selectMin') + ' ' + gameK + ' ' + tt('numbersFor') + ' ' + namesList()[gameK] + '.');
    return;
  }

  winnerMode = false;
  winnerNums.clear();
  drawActive = false;
  document.getElementById('btnWinner').className = 'toggle-btn';
  document.getElementById('btnDraw').className = 'toggle-btn';

  clampTriggerHit();
  updateTHDisplay();
  var lb = estimateLowerBound(v, gameK, triggerVal, hitVal);
  if (lb > MAX_COMBOS) { showErr('⚠️ ' + tt('tooExpensive')); return; }

  setBusy(true);
  setTimeout(function() {
    var bestLines = null;
    for (var r = 0; r < 5; r++) {
      var attempt = autoCorrectingGenerate(pool, gameK, triggerVal, hitVal);
      if (attempt && (!bestLines || attempt.length < bestLines.length)) bestLines = attempt;
    }
    if (!bestLines) { showErr('⚠️ ' + tt('noValidSystem')); setBusy(false); return; }

    currentResults = {pool:pool, k:gameK, trigger:triggerVal, hit:hitVal, lines:bestLines};
    renderResults(currentResults);
    document.getElementById('lbBar').style.display = 'flex';
    document.getElementById('t-lbcombos').textContent = bestLines.length;
    document.getElementById('lbVal').textContent = bestLines.length;
    document.getElementById('lbVal').className = 'lb-val' + (bestLines.length > 150 ? ' warn' : '');
    setBusy(false);
  }, 30);
}

  document.getElementById('resultsWrap').innerHTML = '<div class="err-box">' + msg + '</div>';
  setBusy(false);
}

function setBusy(b) {
  document.getElementById('genBtn').disabled = b;
  document.getElementById('genBtnSticky').disabled = b;
  document.getElementById('t-genbtn').textContent = b ? '⏳ ...' : tt('genbtn');
  document.getElementById('t-genbtn-sticky').textContent = b ? '⏳' : '⚡';
}

function renderResults(res) {
  var pool = res.pool, k = res.k, trigger = res.trigger, hit = res.hit, lines = res.lines;
  var cost = (lines.length * TICKET_PRICE).toFixed(2);
  var totalC = comb(pool.length, k);
  var chance = totalC ? Math.round((lines.length / totalC) * 100) : 0;

  var cardsHTML = '';
  for (var idx = 0; idx < lines.length; idx++) {
    var line = lines[idx];
    var balls = '';
    for (var bi = 0; bi < line.length; bi++) {
      var num = line[bi];
      var isHit = liveNumbers.indexOf(num) >= 0;
      balls += '<div class="ball' + (isHit ? ' hit' : '') + '">' + (num < 10 ? '0' + num : '' + num) + '</div>';
    }
    var hitCount = liveNumbers.length ? line.filter(function(x){ return liveNumbers.indexOf(x) >= 0; }).length : '';
    var hitBadge = hitCount !== '' ? '<div class="rc-hit">' + hitCount + '/' + k + ' ✓</div>' : '';
    cardsHTML +=
      '<div class="res-card" data-line-idx="' + idx + '" style="animation-delay:' + (idx * 0.02) + 's">' +
        '<div class="rc-head">' +
          '<div class="rc-idx">' + (idx + 1) + '</div>' +
          '<div class="rc-title">' + tt('column') + ' ' + (idx + 1) + ' · ' + greekUpper(namesList()[k]) + '</div>' +
          hitBadge +
        '</div>' +
        '<div class="rc-body">' + balls + '</div>' +
      '</div>';
  }

  document.getElementById('resultsWrap').innerHTML =
    '<div class="res-header">' +
      '<div class="res-title">' + tt('result') + '</div>' +
      '<div class="res-count">' + lines.length + ' ' + greekUpper(tt('columns')) + '</div>' +
    '</div>' +
    '<div class="summary-grid">' +
      '<div class="sg-item"><div class="sg-val">' + lines.length + '</div><div class="sg-key">' + tt('columns') + '</div></div>' +
      '<div class="sg-item"><div class="sg-val gold">' + trigger + '→' + hit + '/' + k + '</div><div class="sg-key">' + tt('guarantee') + '</div></div>' +
      '<div class="sg-item"><div class="sg-val blue">' + chance + '%</div><div class="sg-key">' + tt('exactChance') + '</div></div>' +
      '<div class="sg-item"><div class="sg-val orange">' + cost + '€</div><div class="sg-key">' + tt('cost') + '</div></div>' +
    '</div>' +
    '<div class="note-box">' +
      tt('validated') + ': <b style="color:var(--green)">✅ YES</b><br>' +
      tt('triggerHit') + ' <b>' + trigger + '</b> ' + tt('amongSelected') + ' → ' + tt('weGuarantee') + ' <b>' + hit + '/' + k + '</b> ' + tt('onALine') +
    '</div>' +
    cardsHTML;

  document.getElementById('saveBtn').style.display = 'block';
  document.getElementById('genBtnSticky').style.display = 'none';
  document.getElementById('qrBtnSticky').style.display = 'block';
  document.getElementById('qrBtnSticky').textContent = tt('qrTickets');
  showToggleBar(true);

  var lc = currentResults.lines.length;
  document.getElementById('t-lbcombos').textContent = lc;
  document.getElementById('lbVal').textContent = lc;
  document.getElementById('lbVal').className = 'lb-val' + (lc > 150 ? ' warn' : '');
  var lbCostEl = document.getElementById('lbCost');
  if (lbCostEl) {
    lbCostEl.textContent = (lc * 0.5).toFixed(2) + '€';
    lbCostEl.style.color = lc > 150 ? 'var(--price)' : 'var(--gold)';
  }
}

  if (ov.style.display === 'block') {
    ov.style.display = 'none';

    document.getElementById('liveBadgeText').textContent = 'STATS';
  } else {
    ov.style.display = 'block';
    document.body.style.overflow = 'hidden';
    document.getElementById('liveBadgeText').textContent = 'CLOSE';
    spLoad();
  }
}

var STATS_WINDOW = 10;      // history + freq + streak + delay all use same window
var STATS_FETCH_HOURS = 3;  // fetch range

function zp(n){
  return n < 10 ? '0' + n : '' + n;
}

function fmtDate(d){
  return d.getFullYear() + '-' + zp(d.getMonth() + 1) + '-' + zp(d.getDate());
}

function normalizeDraws(draws) {
  return (Array.isArray(draws) ? draws : [])
    .filter(function(d){
      return d && d.winningNumbers && Array.isArray(d.winningNumbers.list) && d.winningNumbers.list.length;
    })
    .map(function(d){
      var nums = d.winningNumbers.list.map(function(x){ return Number(x); });
      nums.sort(function(a,b){ return a-b; });
      return {
        drawId: Number(d.drawId || 0),
        drawTime: Number(d.drawTime || 0),
        winningNumbers: { list: nums }
      };
    })
    .sort(function(a,b){
      if (b.drawId !== a.drawId) return b.drawId - a.drawId;
      return b.drawTime - a.drawTime;
    });
}

function uniquePerDraw(list) {
  var seen = {};
  var out = [];
  for (var i = 0; i < list.length; i++) {
    var n = Number(list[i]);
    if (!seen[n]) {
      seen[n] = true;
      out.push(n);
    }
  }
  return out;
}

function computeStatsFromWindow(draws, N) {
  var hist = normalizeDraws(draws).slice(0, N);

  var freq = {}, streak = {}, delay = {};
  for (var n = 1; n <= 80; n++) {
    freq[n] = 0;
    streak[n] = 0;
    delay[n] = hist.length; // default if not found
  }

  // FREQ
  hist.forEach(function(d){
    uniquePerDraw(d.winningNumbers.list).forEach(function(n){
      freq[n]++;
    });
  });

  // STREAK from newest to oldest
  for (var n2 = 1; n2 <= 80; n2++) {
    var s = 0;
    for (var i = 0; i < hist.length; i++) {
      if (hist[i].winningNumbers.list.indexOf(n2) >= 0) s++;
      else break;
    }
    streak[n2] = s;
  }

  // DELAY from newest to oldest
  for (var n3 = 1; n3 <= 80; n3++) {
    var found = false;
    for (var j = 0; j < hist.length; j++) {
      if (hist[j].winningNumbers.list.indexOf(n3) >= 0) {
        delay[n3] = j;
        found = true;
        break;
      }
    }
    if (!found) delay[n3] = hist.length;
  }

  return {
    hist: hist,
    freq: freq,
    streak: streak,
    delay: delay
  };
}

function fetchDrawsWithFallback(baseUrl, callback) {
  var urls = [
    baseUrl,
    'https://corsproxy.io/?' + baseUrl,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(baseUrl)
  ];

  function tryOne(i) {
    if (i >= urls.length) {
      callback([]);
      return;
    }

    fetch(urls[i])
      .then(function(r){
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data){
        var arr = Array.isArray(data) ? data : (data && data.content ? data.content : []);
        callback(normalizeDraws(arr));
      })
      .catch(function(){
        tryOne(i + 1);
      });
  }

  tryOne(0);
}

function processStats(draws) {
  var stats = computeStatsFromWindow(draws, STATS_WINDOW);
  var hist = stats.hist;
  var freq = stats.freq;
  var delay = stats.delay;
  var streak = stats.streak;

  var ref = document.getElementById('statsDrawRef');
  if (!hist.length) {
    if (ref) ref.textContent = 'No data';
    return;
  }

  if (ref) ref.textContent = hist.length + ' draws';

  var all = [];
  for (var x = 1; x <= 80; x++) all.push(x);

  var hot = all.slice().sort(function(a,b){
    if (freq[b] !== freq[a]) return freq[b] - freq[a];
    return a - b;
  }).slice(0, 12);

  var cold = all.slice().sort(function(a,b){
    if (freq[a] !== freq[b]) return freq[a] - freq[b];
    return a - b;
  }).slice(0, 12);

  var del = all.slice().sort(function(a,b){
    if (delay[b] !== delay[a]) return delay[b] - delay[a];
    return a - b;
  }).slice(0, 12);

  renderStat('statsDelay','⏳ DELAY',del,delay,'delay','κλ');
  renderStat('statsHot','🔥 HOT',hot,freq,'hot','x');
  renderStat('statsCold','❄️ COLD',cold,freq,'cold','x');
}

function spRender(rawDraws) {
  var stats = computeStatsFromWindow(rawDraws, STATS_WINDOW);

  var src = stats.hist;
  var fr = stats.freq;
  var st = stats.streak;
  var dl = stats.delay;

  var all = [];
  for (var x = 1; x <= 80; x++) all.push(x);

  var hot = all.slice().sort(function(a,b){
    if (fr[b] !== fr[a]) return fr[b] - fr[a];
    return a - b;
  }).slice(0, 15);

  var cold = all.slice().sort(function(a,b){
    if (fr[a] !== fr[b]) return fr[a] - fr[b];
    return a - b;
  }).slice(0, 15);

  var del = all.slice().sort(function(a,b){
    if (dl[b] !== dl[a]) return dl[b] - dl[a];
    return a - b;
  }).slice(0, 15);

  var rep = all.filter(function(n){ return st[n] > 0; }).sort(function(a,b){
    if (st[b] !== st[a]) return st[b] - st[a];
    return a - b;
  }).slice(0, 15);

  var maxD = dl[del[0]] || 1;
  var maxF = fr[hot[0]] || 1;

  function col3(v,mx,type){
    var p = mx > 0 ? v / mx : 0;
    if(type === 'delay') return p > 0.7 ? '#dd1100' : p > 0.4 ? '#ee6600' : '#ccaa00';
    if(type === 'hot') return 'rgb(' + Math.round(180 + 75 * p) + ',' + Math.round(50 + 100 * (1 - p)) + ',0)';
    if(type === 'cold') return 'rgb(0,' + Math.round(60 + 100 * p) + ',' + Math.round(140 + 115 * p) + ')';
    return 'rgb(' + Math.round(30 + 80 * p) + ',' + Math.round(150 + 80 * p) + ',' + Math.round(60 + 60 * p) + ')';
  }

  function darkCol(v,mx,type){
    var p = mx > 0 ? v / mx : 0;
    if(type === 'delay') return p > 0.7 ? '#550000' : p > 0.4 ? '#663300' : '#665500';
    if(type === 'hot') return 'rgb(' + Math.round(60 + 40 * p) + ',' + Math.round(10 + 20 * (1 - p)) + ',0)';
    if(type === 'cold') return 'rgb(0,' + Math.round(10 + 30 * p) + ',' + Math.round(60 + 50 * p) + ')';
    return 'rgb(0,' + Math.round(60 + 40 * p) + ',' + Math.round(20 + 20 * p) + ')';
  }

  function mkBall(n,v,mx,type){
    var c = col3(v,mx,type), dc = darkCol(v,mx,type);
    return '<div class="sp-bpair"><div class="sp-bball" style="background:radial-gradient(circle at 35% 35%,' + c + ',' + dc + ');border-color:' + c + ';">' + (n < 10 ? '0' + n : '' + n) + '</div><div class="sp-bval">' + v + '</div></div>';
  }

  function mkRow(label, nums, map, mx, type){
    var h = '<div class="sp-sec"><div class="sp-stitle">' + label + '</div><div class="sp-brow">';
    nums.forEach(function(n){
      h += mkBall(n, map[n], mx, type);
    });
    return h + '</div></div>';
  }

  var h = '<div style="font-size:10px;color:var(--muted2);margin-bottom:14px;font-family:monospace;">window: τελευταίες ' + src.length + ' κληρώσεις</div>';

  h += mkRow('DELAY', del, dl, maxD, 'delay');
  if (rep.length) {
    var maxR = st[rep[0]] || 1;
    h += mkRow('REPEAT', rep, st, maxR, 'repeat');
  }
  h += mkRow('HOT', hot, fr, maxF, 'hot');
  h += mkRow('COLD', cold, fr, maxF, 'cold');

  var last = src[0];
  if (last) {
    var lN = last.winningNumbers.list.slice().sort(function(a,b){ return a-b; });
    h += '<div class="sp-sec"><div class="sp-stitle">LAST DRAW #' + (last.drawId || '') + '</div><div class="sp-lgrid">';
    lN.forEach(function(n){
      h += '<div class="sp-lb">' + (n < 10 ? '0' + n : '' + n) + '</div>';
    });
    h += '</div></div>';
  }

  h += '<div class="sp-sec"><div class="sp-stitle">HISTORY</div>';
  src.forEach(function(d, idx){
    var nums = d.winningNumbers.list.slice().sort(function(a,b){ return a-b; });
    h += '<div class="sp-hrow"><div class="sp-hid">#' + (d.drawId || '') + (idx === 0 ? ' <span style="color:var(--green)">[newest]</span>' : '') + '</div><div class="sp-hballs">';
    nums.forEach(function(n){
      h += '<div class="sp-hb">' + (n < 10 ? '0' + n : '' + n) + '</div>';
    });
    h += '</div></div>';
  });
  h += '</div>';

  document.getElementById('spContent').innerHTML = h;
  var cb = document.getElementById('spClose');
  if (cb) cb.onclick = spClose;

  // DEBUG
  console.log('=== KINO STATS DEBUG ===');
  console.log('window drawIds:', src.map(function(d){ return d.drawId; }));
  console.log('47 -> FREQ:', fr[47], 'STREAK:', st[47], 'DELAY:', dl[47]);
  console.log('06 -> FREQ:', fr[6], 'STREAK:', st[6], 'DELAY:', dl[6]);
}

    var card = cardEls[ci];
    var lineIdx = parseInt(card.getAttribute('data-line-idx'), 10);
    if (isNaN(lineIdx)) lineIdx = ci;
    var line = lines[lineIdx];
    if (!line) continue;

    var hits = 0;
    for (var j = 0; j < line.length; j++) {
      if (winnerNums.has(line[j])) hits++;
    }

    var head = card.querySelector('.rc-head');
    if (head) {
      var oldBadge = head.querySelector('.draw-badge');
      if (oldBadge) oldBadge.remove();
      var oldPay = head.querySelector('.payout-badge');
      if (oldPay) oldPay.remove();

      var badge = document.createElement('div');
      badge.className = hits === k ? 'draw-badge hit-full' : hits >= Math.ceil(k / 2) ? 'draw-badge hit-good' : 'draw-badge hit-low';
      badge.textContent = hits + '/' + k;
      head.appendChild(badge);

      var payout = getPayout(k, hits);
      var payBadge = document.createElement('div');
      if (payout > 0) {
        payBadge.className = payout >= 1000 ? 'payout-badge big' : 'payout-badge win';
        payBadge.textContent = payout >= 1000000
          ? (payout / 1000000).toFixed(1) + 'M€'
          : payout >= 1000 ? (payout / 1000).toFixed(0) + 'K€'
          : payout + '€';
      } else {
        payBadge.className = 'payout-badge nowin';
        payBadge.textContent = '0€';
      }
      head.appendChild(payBadge);
    }

    var body = card.querySelector('.rc-body');
    if (body) {
      var balls = body.querySelectorAll('.ball');
      for (var b = 0; b < balls.length; b++) {
        var num = parseInt(balls[b].textContent, 10);
        if (winnerNums.has(num)) balls[b].classList.add('hit');
        else balls[b].classList.remove('hit');
      }
    }

    cardData.push({el: card, hits: hits});
  }

  var totalWin = 0;
  for (var ti = 0; ti < cardData.length; ti++) totalWin += getPayout(k, cardData[ti].hits);
  totalWin = Math.round(totalWin * 100) / 100;

  var oldTotal = wrap.querySelector('.total-winnings');
  if (oldTotal) oldTotal.remove();

  var totalBar = document.createElement('div');
  totalBar.className = 'total-winnings';
  var modeLabel = bonusMode ? 'KINO BONUS' : 'KINO';
  totalBar.innerHTML =
    '<div class="total-winnings-label">' +
      '<b>' + tt('totalWinnings') + '</b><br>' +
      modeLabel + ' &nbsp;·&nbsp; ' + currentResults.lines.length + ' ' + tt('lines') + ' × 0.50€' +
    '</div>' +
    '<div class="total-winnings-amount">' +
      totalWin.toFixed(2) + '<small>€</small>' +
    '</div>';

  cardData.sort(function(a,b){ return b.hits - a.hits; });

  var oldVerified = wrap.querySelector('.verified-box');
  if (oldVerified) oldVerified.remove();

  var pool = currentResults.pool;
  var hitCount = 0;
  for (var vi = 0; vi < pool.length; vi++) {
    if (winnerNums.has(pool[vi])) hitCount++;
  }

  var verifiedBox = document.createElement('div');
  verifiedBox.className = 'verified-box';

  var ballsHtml = '';
  for (var pi = 0; pi < pool.length; pi++) {
    var pn = pool[pi];
    var isHit = winnerNums.has(pn);
    ballsHtml += '<div class="vball' + (isHit ? ' hit' : '') + '">' + (pn < 10 ? '0' + pn : '' + pn) + '</div>';
  }

  verifiedBox.innerHTML =
    '<div class="verified-title">' +
      '<span>' + tt('verified') + '</span>' +
      '<span class="verified-count">' + hitCount + '/' + pool.length + '</span>' +
    '</div>' +
    '<div class="verified-balls">' + ballsHtml + '</div>';

  wrap.appendChild(totalBar);
  wrap.appendChild(verifiedBox);
  for (var di = 0; di < cardData.length; di++) {
    wrap.appendChild(cardData[di].el);
  }
}

function toggleNum(n) {
  if (winnerMode) {
    toggleNumWinner(n);
  } else {
    if (selected.has(n)) selected.delete(n); else selected.add(n);
    syncSelectedVisuals();
    updateSelBar();
    clampTriggerHit();
    updateSystem();
  }
}

function showToggleBar(show) {
  document.getElementById('toggleBar').style.display = show ? 'flex' : 'none';
}

function openQRModal() {
  if (!currentResults) return;
  var body = document.getElementById('qrModalBody');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">' + tt('qrLoading') + '</div>';
  document.getElementById('qrModal').className = 'sys-modal open';
  document.body.style.overflow = 'hidden';

  if (typeof QRCode === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload = function() { buildQRCards(); };
    script.onerror = function() {
      body.innerHTML = '<div class="err-box">' + tt('qrFailed') + '</div>';
    };
    document.head.appendChild(script);
  } else {
    buildQRCards();
  }
}

function buildQRCards() {
  var body = document.getElementById('qrModalBody');
  body.innerHTML = '';
  var lines = currentResults.lines;
  var k = currentResults.k;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var nums = line.join(',');
    var qrData = 'KINO|' + k + '|' + nums;

    var card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML =
      '<div class="qr-card-title">' + tt('column') + ' ' + (i + 1) + ' · ' + k + ' ' + (currentLang === 'el' ? 'ΑΡΙΘΜΟΙ' : 'NUMBERS') + '</div>' +
      '<div id="qr-' + i + '"></div>' +
      '<div class="qr-nums">' + line.map(function(n){ return n < 10 ? '0' + n : '' + n; }).join(' · ') + '</div>';
    body.appendChild(card);

    try {
      new QRCode(document.getElementById('qr-' + i), {
        text: qrData,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      document.getElementById('qr-' + i).innerHTML =
        '<div style="font-size:11px;color:var(--red);padding:10px;">' + tt('qrFailed') + '</div>';
    }
  }
}

function closeQRModal() {
  document.getElementById('qrModal').className = 'sys-modal';
  document.body.style.overflow = '';
}

buildNumGrid();
buildTypeCards();
updateTHDisplay();
updateSystem();
refreshSavedBadge();
setLang('el');
loadStats();
</script>
